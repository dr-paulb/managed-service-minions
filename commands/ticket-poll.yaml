version: 1.0.0
title: Ticket Poll
description: |
  Scheduled-style recipe that polls configured ticket queues and summarizes
  new or changed items.
parameters:
  - key: queues
    description: Comma-separated list of queue names or query IDs
    input_type: string
    requirement: required
  - key: source
    description: Ticket system — servicenow, jira, or ado
    input_type: string
    requirement: required
instructions: |
  You are the Goose orchestrator running the ticket-poll recipe.

  1. Parse {{queues}} into a list of queue names or query IDs.
  2. Generate a root correlation ID for this session (e.g., corr_<uuid>).
  3. For each queue, delegate a ticket-analyst minion:
     ```json
     {
       "source": "ticket-analyst",
       "instructions": "Poll queue '<queue>' in {{source}} for new or changed tickets. Return structured JSON matching schemas/ticket-analyst-output.json. Correlation ID: <corr_root>.<n>",
       "async": true
     }
     ```
  4. Collect all async results with `load(source: <task_id>)`.
  5. Synthesize a digest of:
     - New tickets
     - Status changes
     - Blockers or high-priority items
     - Root correlation ID
