governance:
  destructive_actions:
    - server_alias: github
      tool_name: github_merge_pull_request
    - server_alias: azure_devops
      tool_name: ado_merge_pull_request
    - server_alias: servicenow
      tool_name: servicenow_update_incident
    - server_alias: jira
      tool_name: jira_update_issue

  approval_timeout_minutes: 15

  rate_limits:
    default:
      requests_per_minute: 60
      burst: 20
    github:
      requests_per_minute: 30
      burst: 10
    azure_devops:
      requests_per_minute: 60
      burst: 20
    servicenow:
      requests_per_minute: 60
      burst: 20
    jira:
      requests_per_minute: 60
      burst: 20

  workspace_boundaries:
    allowed_base_paths:
      - /repo
    deny_patterns:
      - .git/
      - node_modules/
      - secrets/
      - .env*

  fallback_behavior:
    on_allowlist_block: escalate_and_terminate
    on_rate_limit: retry_with_backoff
    on_circuit_breaker_open: fast_fail_with_retry_after
    on_approval_timeout: deny
    on_minion_timeout: retry_up_to_3
    on_invalid_json_output: retry_once_with_feedback
