allowlists:
  code_explorer:
    github:
      - github_list_pull_requests
      - github_get_pull_request
      - github_get_pull_request_diff
      - github_get_file_contents
    azure_devops:
      - ado_list_pull_requests
      - ado_get_pull_request
      - ado_get_pull_request_diff
    servicenow:
      - servicenow_list_incidents
      - servicenow_get_incident
    jira:
      - jira_list_issues
      - jira_get_issue
  code_reviewer:
    github:
      - github_get_pull_request
      - github_get_pull_request_diff
    azure_devops:
      - ado_get_pull_request
      - ado_get_pull_request_diff
  pr_crafter:
    github:
      - github_list_pull_requests
      - github_get_pull_request
      - github_create_pull_request
    azure_devops:
      - ado_get_pull_request
      - ado_create_pull_request
  ticket_analyst:
    servicenow:
      - servicenow_list_incidents
      - servicenow_get_incident
    jira:
      - jira_list_issues
      - jira_get_issue
    azure_devops:
      - ado_list_work_items
      - ado_get_work_item
  security_auditor:
    github:
      - github_get_pull_request
      - github_get_file_contents

path_scopes:
  code_explorer:
    mode: allowlist
    paths:
      - /repo
    deny:
      - .git/
      - node_modules/
      - secrets/
      - .env*
  code_reviewer:
    mode: allowlist
    paths:
      - /repo
    deny:
      - .git/
      - node_modules/
      - secrets/
      - .env*
  pr_crafter:
    mode: allowlist
    paths:
      - /repo
    deny:
      - .git/
      - node_modules/
      - secrets/
      - .env*
  security_auditor:
    mode: allowlist
    paths:
      - /repo
    deny:
      - .git/
      - node_modules/
      - secrets/
      - .env*
