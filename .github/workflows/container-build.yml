name: Container Build and Push

on:
  push:
    branches: [main]
    paths:
      - 'extensions/**'
      - 'packages/framework-core/**'
      - 'Dockerfile'
      - '.github/workflows/container-build.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
  pull_request:
    branches: [main]
    paths:
      - 'extensions/**'
      - 'packages/framework-core/**'
      - '.github/workflows/container-build.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mcp-toolshed
            dockerfile: extensions/mcp-toolshed/Dockerfile
          - name: mcp-github
            dockerfile: extensions/mcp-github/Dockerfile
          - name: mcp-azure-devops
            dockerfile: extensions/mcp-azure-devops/Dockerfile
          - name: mcp-servicenow
            dockerfile: extensions/mcp-servicenow/Dockerfile
          - name: mcp-jira
            dockerfile: extensions/mcp-jira/Dockerfile
          - name: slack-bot
            dockerfile: extensions/slack-bot/Dockerfile
          - name: teams-bot
            dockerfile: extensions/teams-bot/Dockerfile
          - name: agent-dashboard
            dockerfile: extensions/agent-dashboard/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        if: github.event_name == 'push' && env.ACR_LOGIN_SERVER != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
        env:
          ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' && vars.ACR_LOGIN_SERVER != '' }}
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.name }}:${{ github.sha }}
            ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run smoke test
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.name }}:${{ github.sha }} node -e "console.log('smoke ok')" || true
